<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f4);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; }
        .tabs { display: flex; background: var(--sec-bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold; }
        .tab.active { border-bottom: 2px solid var(--btn); color: var(--btn); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .card { background: var(--sec-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        input { width: 100%; box-sizing: border-box; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; background: var(--bg); color: var(--text); font-size: 16px; }
        button { background: var(--btn); color: var(--btn-text); border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .del { color: #ff4d4d; font-weight: bold; cursor: pointer; }
        .summary-badge { padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab('tab-pool')">💰 Банк</div>
        <div class="tab" onclick="openTab('tab-spend')">🛒 Чеки</div>
        <div class="tab" onclick="openTab('tab-res')">🏁 Звіт</div>
    </div>

    <div id="tab-pool" class="content active">
        <div class="card">
            <input type="text" id="pName" placeholder="Ім'я">
            <input type="number" id="pAmount" placeholder="Скільки здав?">
            <button onclick="addP()">Додати в касу</button>
        </div>
        <div id="p-list"></div>
    </div>

    <div id="tab-spend" class="content">
        <div class="card">
            <input type="text" id="eDesc" placeholder="Що купили?">
            <input type="number" id="eAmount" placeholder="Ціна">
            <button onclick="addE()">Додати витрату</button>
        </div>
        <div id="e-list"></div>
    </div>

    <div id="tab-res" class="content">
        <div id="final-stats"></div>
        <div id="final-details"></div>
        <button onclick="sendToBot()" style="background: #28a745; margin-top: 15px;">Надіслати в чат</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let pool = JSON.parse(localStorage.getItem('p_v8')) || [];
        let exp = JSON.parse(localStorage.getItem('e_v8')) || [];

        function openTab(id) {
            document.querySelectorAll('.content, .tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'tab-res') updateRes();
        }

        function addP() {
            const n = document.getElementById('pName'), a = document.getElementById('pAmount');
            if(n.value && a.value) {
                pool.push({n: n.value, a: parseFloat(a.value)});
                save(); renderP(); n.value = ''; a.value = '';
            }
        }

        function addE() {
            const d = document.getElementById('eDesc'), a = document.getElementById('eAmount');
            if(d.value && a.value) {
                exp.push({d: d.value, a: parseFloat(a.value)});
                save(); renderE(); d.value = ''; a.value = '';
            }
        }

        function save() {
            localStorage.setItem('p_v8', JSON.stringify(pool));
            localStorage.setItem('e_v8', JSON.stringify(exp));
        }

        function renderP() {
            document.getElementById('p-list').innerHTML = pool.map((x, i) => `<div class="item"><span>${x.n}: ${x.a}</span><span class="del" onclick="delP(${i})">✕</span></div>`).join('');
        }

        function renderE() {
            document.getElementById('e-list').innerHTML = exp.map((x, i) => `<div class="item"><span>${x.d}: ${x.a}</span><span class="del" onclick="delE(${i})">✕</span></div>`).join('');
        }

        function delP(i) { pool.splice(i, 1); save(); renderP(); }
        function delE(i) { exp.splice(i, 1); save(); renderE(); }

        function updateRes() {
            let tin = pool.reduce((s, i) => s + i.a, 0);
            let tout = exp.reduce((s, i) => s + i.a, 0);
            let avg = pool.length ? (tout / pool.length) : 0;
            let diff_total = tin - tout;

            let badgeColor = diff_total >= 0 ? "#e8f5e9" : "#ffebee";
            let badgeText = diff_total >= 0 
                ? `💰 Решта: <b>${diff_total.toFixed(2)} грн</b>` 
                : `⚠️ Не вистачило: <b>${Math.abs(diff_total).toFixed(2)} грн</b>`;

            document.getElementById('final-stats').innerHTML = `
                <div class="summary-badge" style="background: ${badgeColor}; color: #333;">
                    Зібрано: ${tin.toFixed(2)} | Витрачено: ${tout.toFixed(2)}<br>${badgeText}
                </div>
            `;

            let html = "";
            pool.forEach(x => {
                let user_diff = x.a - avg;
                let status = user_diff >= 0 
                    ? `<span style="color:green">Віддати йому: <b>${user_diff.toFixed(2)}</b></span>`
                    : `<span style="color:red">Має докласти: <b>${Math.abs(user_diff).toFixed(2)}</b></span>`;
                html += `<div class="card"><b>${x.n}</b> (здав ${x.a})<br>${status}</div>`;
            });
            document.getElementById('final-details').innerHTML = html;
        }

        function sendToBot() { tg.sendData(JSON.stringify({p: pool, e: exp})); }
        renderP(); renderE();
    </script>
</body>
</html>
