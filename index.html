<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px; width: 100%; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h2>✈️ Поїздка в гори</h2>
    <div id="expense-list"></div>
    
    <div class="card">
        <h3>Додати витрату</h3>
        <input type="text" id="name" placeholder="Хто платив?">
        <input type="number" id="amount" placeholder="Сума">
        <button onclick="addExpense()">Додати</button>
    </div>

    <button style="margin-top: 20px;" onclick="sendDataToBot()">✅ Готово / Розрахувати</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран

        let expenses = [];

        function addExpense() {
            const name = document.getElementById('name').value;
            const amount = document.getElementById('amount').value;
            if(name && amount) {
                expenses.push({name, amount: parseFloat(amount)});
                document.getElementById('expense-list').innerHTML += `<div class="card">${name}: ${amount} грн</div>`;
            }
        }

        function sendDataToBot() {
            // Відправляємо дані назад у бот
            tg.sendData(JSON.stringify(expenses));
            tg.close();
        }
    </script>
</body>
</html>
