<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000000; 
            color: #ffffff; 
            padding: 0; margin: 0; 
        }

        /* Навігація - велика та контрастна */
        .tabs { 
            display: flex; background: #1a1a1a; 
            position: sticky; top: 0; z-index: 100;
            border-bottom: 2px solid #333;
        }
        .tab { 
            flex: 1; padding: 20px 10px; text-align: center; 
            cursor: pointer; font-weight: 900; font-size: 16px;
            color: #888; transition: 0.2s;
        }
        .tab.active { 
            color: #00e5ff; 
            border-bottom: 4px solid #00e5ff;
            background: #222;
        }

        .content { padding: 20px; display: none; }
        .content.active { display: block; }

        /* Екрани з сумами */
        .display {
            padding: 25px; border-radius: 20px; text-align: center;
            margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.1);
        }
        .bg-blue { background: #003366; border-color: #00e5ff; }
        .bg-orange { background: #663300; border-color: #ff9100; }
        
        .val { font-size: 36px; font-weight: 900; display: block; color: #fff; }
        .lbl { font-size: 14px; text-transform: uppercase; color: #aaa; font-weight: bold; }

        /* Картки та кнопки */
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        input { 
            width: 100%; box-sizing: border-box; padding: 16px; 
            margin: 10px 0; border-radius: 12px; border: 2px solid #444; 
            background: #000; color: #fff; font-size: 18px; font-weight: bold;
        }
        input:focus { border-color: #00e5ff; outline: none; }
        
        .btn { 
            border: none; padding: 18px; width: 100%; border-radius: 12px; 
            font-weight: 900; font-size: 18px; cursor: pointer; color: #fff;
            text-transform: uppercase;
        }
        .btn-blue { background: #0088ff; box-shadow: 0 4px 0 #0055aa; }
        .btn-orange { background: #ff8800; box-shadow: 0 4px 0 #aa5500; }
        .btn-green { background: #22cc33; box-shadow: 0 4px 0 #116611; }

        /* Списки з видаленням */
        .row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: #111; border-radius: 12px; 
            margin-bottom: 10px; border-left: 6px solid #00e5ff;
        }
        .row-orange { border-left-color: #ff8800; }
        .info { font-size: 18px; }
        .info b { color: #00e5ff; }
        .row-orange .info b { color: #ff8800; }
        .del { color: #ff4444; font-size: 24px; font-weight: bold; width: 40px; text-align: right; }

        /* Результати */
        .res-banner {
            padding: 20px; border-radius: 15px; text-align: center;
            margin-bottom: 25px; font-size: 20px; font-weight: 900;
            border: 3px solid;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="tab('tab-p', this)">БАНК</div>
        <div class="tab" onclick="tab('tab-e', this)">ЧЕКИ</div>
        <div class="tab" onclick="tab('tab-r', this)">ЗВІТ</div>
    </div>

    <div id="tab-p" class="content active">
        <div class="display bg-blue">
            <span class="lbl">Зібрана каса</span>
            <span id="sum-p" class="val">0.00 грн</span>
        </div>
        <div class="card">
            <input type="text" id="i-pn" placeholder="Ім'я">
            <input type="number" id="i-pa" placeholder="Сума">
            <button class="btn btn-blue" onclick="addP()">ДОДАТИ ГРОШІ</button>
        </div>
        <div id="list-p"></div>
    </div>

    <div id="tab-e" class="content">
        <div class="display bg-orange">
            <span class="lbl">Загальні витрати</span>
            <span id="sum-e" class="val">0.00 грн</span>
        </div>
        <div class="card">
            <input type="text" id="i-ed" placeholder="Назва товару">
            <input type="number" id="i-ea" placeholder="Ціна">
            <button class="btn btn-orange" onclick="addE()">ДОДАТИ ВИТРАТУ</button>
        </div>
        <div id="list-e"></div>
    </div>

    <div id="tab-r" class="content">
        <div id="res-top"></div>
        <div id="res-bot"></div>
        <button class="btn btn-green" style="margin-top:20px" onclick="send()">ВІДПРАВИТИ В ТЕЛЕГРАМ</button>
        <button onclick="clearAll()" style="background:none; border:none; color:#666; width:100%; margin-top:30px; font-weight:bold">ОЧИСТИТИ ВСЕ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let p = JSON.parse(localStorage.getItem('p_v12')) || [];
        let e = JSON.parse(localStorage.getItem('e_v12')) || [];

        function tab(id, el) {
            document.querySelectorAll('.content, .tab').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'tab-r') calc();
        }

        function addP() {
            const n = document.getElementById('i-pn'), a = document.getElementById('i-pa');
            if(n.value && a.value) {
                p.push({n: n.value, a: parseFloat(a.value)});
                save(); renderP(); n.value = ''; a.value = '';
            }
        }

        function addE() {
            const d = document.getElementById('i-ed'), a = document.getElementById('i-ea');
            if(d.value && a.value) {
                e.push({d: d.value, a: parseFloat(a.value)});
                save(); renderE(); d.value = ''; a.value = '';
            }
        }

        function save() {
            localStorage.setItem('p_v12', JSON.stringify(p));
            localStorage.setItem('e_v12', JSON.stringify(e));
        }

        function renderP() {
            let s = p.reduce((acc, x) => acc + x.a, 0);
            document.getElementById('sum-p').innerText = s.toFixed(2) + ' грн';
            document.getElementById('list-p').innerHTML = p.map((x, i) => `
                <div class="row">
                    <div class="info"><b>${x.n}</b>: ${x.a} грн</div>
                    <div class="del" onclick="delP(${i})">✕</div>
                </div>`).join('');
        }

        function renderE() {
            let s = e.reduce((acc, x) => acc + x.a, 0);
            document.getElementById('sum-e').innerText = s.toFixed(2) + ' грн';
            document.getElementById('list-e').innerHTML = e.map((x, i) => `
                <div class="row row-orange">
                    <div class="info"><b>${x.d}</b>: ${x.a} грн</div>
                    <div class="del" onclick="delE(${i})">✕</div>
                </div>`).join('');
        }

        function delP(i) { p.splice(i, 1); save(); renderP(); }
        function delE(i) { e.splice(i, 1); save(); renderE(); }
        function clearAll() { if(confirm('Видалити все?')) { p=[]; e=[]; save(); renderP(); renderE(); } }

        function calc() {
            let tin = p.reduce((s, x) => s + x.a, 0);
            let tout = e.reduce((s, x) => s + x.x || s + x.a, 0);
            let h = document.getElementById('res-top'), b = document.getElementById('res-bot');
            let html = "";

            if (tin >= tout) {
                let rem = tin - tout;
                h.innerHTML = `<div class="res-banner" style="background:#004400; border-color:#22cc33; color:#22cc33">✅ РЕШТА: ${rem.toFixed(2)} грн</div>`;
                p.forEach(x => {
                    let back = rem * (x.a / tin);
                    html += `<div class="card">👤 <b>${x.n}</b> (здав ${x.a})<br>Повернути йому: <b style="color:#22cc33; font-size:20px">${back.toFixed(2)} грн</b></div>`;
                });
            } else {
                let debt = tout - tin;
                let per = debt / p.length;
                h.innerHTML = `<div class="res-banner" style="background:#440000; border-color:#ff4444; color:#ff4444">⚠️ ДОПЛАТИТИ: ${debt.toFixed(2)} грн</div>`;
                p.forEach(x => {
                    html += `<div class="card">👤 <b>${x.n}</b><br>Додати порівну: <b style="color:#ff4444; font-size:20px">${per.toFixed(2)} грн</b></div>`;
                });
            }
            b.innerHTML = html;
        }

        function send() { tg.sendData(JSON.stringify({p: p, e: e})); }
        renderP(); renderE();
        tg.expand();
    </script>
</body>
</html>
