<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f4);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; }
        .tabs { display: flex; background: var(--sec-bg); border-bottom: 1px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold; font-size: 14px; }
        .tab.active { border-bottom: 2px solid var(--btn); color: var(--btn); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .card { background: var(--sec-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .total-info { background: var(--btn); color: var(--btn-text); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        input { width: 100%; box-sizing: border-box; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; background: var(--bg); color: var(--text); font-size: 16px; }
        button { background: var(--btn); color: var(--btn-text); border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .del { color: #ff4d4d; font-weight: bold; padding: 0 5px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab('tab-pool')">💰 Каса</div>
        <div class="tab" onclick="openTab('tab-spend')">🛒 Витрати</div>
        <div class="tab" onclick="openTab('tab-res')">🏁 Підсумок</div>
    </div>

    <div id="tab-pool" class="content active">
        <div id="pool-sum" class="total-info">Всього в касі: 0 грн</div>
        <div class="card">
            <input type="text" id="pName" placeholder="Хто скинувся?">
            <input type="number" id="pAmount" placeholder="Сума">
            <button onclick="addP()">Додати в касу</button>
        </div>
        <div id="p-list"></div>
    </div>

    <div id="tab-spend" class="content">
        <div id="exp-sum" class="total-info">Витрачено: 0 грн</div>
        <div class="card">
            <input type="text" id="eDesc" placeholder="Назва покупки">
            <input type="number" id="eAmount" placeholder="Вартість">
            <button onclick="addE()">Записати витрату</button>
        </div>
        <div id="e-list"></div>
    </div>

    <div id="tab-res" class="content">
        <div class="card" id="final-stats"></div>
        <div id="final-list"></div>
        <button onclick="sendData()" style="background: #28a745;">Надіслати звіт у чат</button>
        <button onclick="clearAll()" style="background: #666; margin-top: 20px; font-size: 12px; padding: 8px;">Очистити все</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let p = JSON.parse(localStorage.getItem('p_v7')) || [];
        let e = JSON.parse(localStorage.getItem('e_v7')) || [];

        function openTab(id) {
            document.querySelectorAll('.content, .tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'tab-res') updateRes();
        }

        function addP() {
            const n = document.getElementById('pName'), a = document.getElementById('pAmount');
            if(n.value && a.value) {
                p.push({n: n.value, a: parseFloat(a.value)});
                save(); renderP(); n.value = ''; a.value = '';
            }
        }

        function addE() {
            const d = document.getElementById('eDesc'), a = document.getElementById('eAmount');
            if(d.value && a.value) {
                e.push({d: d.value, a: parseFloat(a.value)});
                save(); renderE(); d.value = ''; a.value = '';
            }
        }

        function save() {
            localStorage.setItem('p_v7', JSON.stringify(p));
            localStorage.setItem('e_v7', JSON.stringify(e));
        }

        function renderP() {
            let total = p.reduce((s, i) => s + i.a, 0);
            document.getElementById('pool-sum').innerText = `Всього в касі: ${total.toFixed(2)} грн`;
            document.getElementById('p-list').innerHTML = p.map((x, i) => `<div class="item"><span>${x.n}: ${x.a}</span><span class="del" onclick="delP(${i})">✕</span></div>`).join('');
        }

        function renderE() {
            let total = e.reduce((s, i) => s + i.a, 0);
            document.getElementById('exp-sum').innerText = `Витрачено: ${total.toFixed(2)} грн`;
            document.getElementById('e-list').innerHTML = e.map((x, i) => `<div class="item"><span>${x.d}: ${x.a}</span><span class="del" onclick="delE(${i})">✕</span></div>`).join('');
        }

        function delP(i) { p.splice(i, 1); save(); renderP(); }
        function delE(i) { e.splice(i, 1); save(); renderE(); }
        function clearAll() { if(confirm('Очистити всі дані?')) { p=[]; e=[]; save(); renderP(); renderE(); openTab('tab-pool'); } }

        function updateRes() {
            let tin = p.reduce((s, i) => s + i.a, 0);
            let tout = e.reduce((s, i) => s + i.a, 0);
            let avg = p.length ? (tout / p.length) : 0;
            let rem = tin - tout;

            document.getElementById('final-stats').innerHTML = `
                💵 Початкова каса: <b>${tin.toFixed(2)}</b><br>
                🛒 Всього витрат: <b>${tout.toFixed(2)}</b><br>
                💰 <b>ЗАЛИШОК (РЕШТА): ${rem.toFixed(2)}</b>
            `;

            let html = "";
            p.forEach(x => {
                let diff = x.a - avg;
                let color = diff >= 0 ? "green" : "red";
                let action = diff >= 0 ? `Віддати йому: <b>${diff.toFixed(2)}</b>` : `Має доплатити: <b>${Math.abs(diff).toFixed(2)}</b>`;
                html += `<div class="card" style="border-left: 4px solid ${color}"><b>${x.n}</b> (здав ${x.a})<br>${action}</div>`;
            });
            document.getElementById('final-list').innerHTML = html;
        }

        function sendData() { tg.sendData(JSON.stringify({p, e})); }
        renderP(); renderE();
    </script>
</body>
</html>
