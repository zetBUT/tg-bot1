<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f4);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .card { background: var(--sec-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input { 
            width: 100%; box-sizing: border-box; padding: 12px; margin: 8px 0; 
            border-radius: 10px; border: 1px solid #ccc; font-size: 16px; 
            background: var(--bg); color: var(--text);
        }
        button { 
            background: var(--btn); color: var(--btn-text); border: none; 
            padding: 14px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; 
        }
        .search-box { border: 2px solid var(--btn); margin-bottom: 20px; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); 
        }
        .del-btn { background: #ff4d4d; width: auto; padding: 6px 12px; font-size: 13px; }
        h3, h4 { margin-top: 0; }
    </style>
</head>
<body>
    <h3>📊 Менеджер витрат</h3>
    
    <!-- ПОШУК -->
    <input type="text" id="search" class="search-box" placeholder="🔍 Швидкий пошук за іменем..." oninput="render()">

    <!-- ДОДАВАННЯ (БЕЗ СТИРАННЯ СТАРОГО) -->
    <div class="card">
        <h4>Додати нову витрату</h4>
        <input type="text" id="userName" placeholder="Ім'я (напр. Олег)">
        <input type="number" id="userAmount" placeholder="Сума (напр. 500)">
        <button onclick="addNew()">➕ Додати у список</button>
    </div>

    <div id="list-container"></div>

    <!-- ВІДПРАВКА В БОТ -->
    <button style="margin-top: 20px; background: #28a745;" onclick="sendToBot()">✅ Розрахувати в Telegram</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Завантаження збережених даних, щоб нічого не зникало
        let items = JSON.parse(localStorage.getItem('trip_data')) || [];

        function render() {
            const container = document.getElementById('list-container');
            const query = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            const filtered = items.filter(i => i.name.toLowerCase().includes(query));

            filtered.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span><strong>${item.name}</strong>: ${item.amount} грн</span>
                    <button class="del-btn" onclick="remove(${index})">видалити</button>
                `;
                container.appendChild(div);
            });
        }

        function addNew() {
            const n = document.getElementById('userName');
            const a = document.getElementById('userAmount');

            if(n.value.trim() && a.value) {
                items.push({ name: n.value.trim(), amount: parseFloat(a.value) });
                localStorage.setItem('trip_data', JSON.stringify(items));
                
                // ОЧИЩЕННЯ ПОЛІВ: тепер ти просто вводиш наступне
                n.value = '';
                a.value = '';
                n.focus();
                
                render();
            }
        }

        function remove(idx) {
            items.splice(idx, 1);
            localStorage.setItem('trip_data', JSON.stringify(items));
            render();
        }

        function sendToBot() {
            if(items.length === 0) return tg.showAlert("Список порожній!");
            tg.sendData(JSON.stringify(items));
        }

        render();
    </script>
</body>
</html>
