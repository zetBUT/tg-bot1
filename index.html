<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f4);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; }
        .tabs { display: flex; background: var(--sec-bg); border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold; }
        .tab.active { border-bottom: 2px solid var(--btn); color: var(--btn); }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .card { background: var(--sec-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input { width: 100%; box-sizing: border-box; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; background: var(--bg); color: var(--text); }
        button { background: var(--btn); color: var(--btn-text); border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .res-msg { padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab('tab-pool')">💰 Скидаємось</div>
        <div class="tab" onclick="openTab('tab-spend')">🛒 Витрати</div>
        <div class="tab" onclick="openTab('tab-res')">🏁 Підсумок</div>
    </div>

    <div id="tab-pool" class="content active">
        <div class="card">
            <input type="text" id="pName" placeholder="Ім'я">
            <input type="number" id="pAmount" placeholder="Сума">
            <button onclick="addP()">В касу</button>
        </div>
        <div id="p-list"></div>
    </div>

    <div id="tab-spend" class="content">
        <div class="card">
            <input type="text" id="eDesc" placeholder="На що?">
            <input type="number" id="eAmount" placeholder="Ціна">
            <button onclick="addE()">Додати чек</button>
        </div>
        <div id="e-list"></div>
    </div>

    <div id="tab-res" class="content">
        <div id="res-header"></div>
        <div id="res-details"></div>
        <button onclick="send()" style="background: #28a745; margin-top: 15px;">Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let pool = JSON.parse(localStorage.getItem('p_v9')) || [];
        let exp = JSON.parse(localStorage.getItem('e_v9')) || [];

        function openTab(id) {
            document.querySelectorAll('.content, .tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'tab-res') calculate();
        }

        function addP() {
            const n = document.getElementById('pName'), a = document.getElementById('pAmount');
            if(n.value && a.value) {
                pool.push({n: n.value, a: parseFloat(a.value)});
                save(); renderP(); n.value = ''; a.value = '';
            }
        }

        function addE() {
            const d = document.getElementById('eDesc'), a = document.getElementById('eAmount');
            if(d.value && a.value) {
                exp.push({d: d.value, a: parseFloat(a.value)});
                save(); renderE(); d.value = ''; a.value = '';
            }
        }

        function save() {
            localStorage.setItem('p_v9', JSON.stringify(pool));
            localStorage.setItem('e_v9', JSON.stringify(exp));
        }

        function renderP() {
            document.getElementById('p-list').innerHTML = pool.map((x, i) => `<div class="item">${x.n}: ${x.a}</div>`).join('');
        }

        function renderE() {
            document.getElementById('e-list').innerHTML = exp.map((x, i) => `<div class="item">${x.d}: ${x.a}</div>`).join('');
        }

        function calculate() {
            let tin = pool.reduce((s, i) => s + i.a, 0);
            let tout = exp.reduce((s, i) => s + i.a, 0);
            let header = document.getElementById('res-header');
            let details = document.getElementById('res-details');
            let html = "";

            if (tin >= tout) {
                // СЦЕНАРІЙ 1: ГРОШЕЙ ВИСТАЧИЛО (РЕШТА ПО КОЕФІЦІЄНТАМ)
                let remains = tin - tout;
                header.innerHTML = `<div class="res-msg" style="background:#e8f5e9">💰 Решта: ${remains.toFixed(2)} грн</div>`;
                pool.forEach(x => {
                    let koef = x.a / tin; // Частка людини в банку
                    let userRemains = remains * koef;
                    html += `<div class="card"><b>${x.n}</b><br>Повернути з решти: <b style="color:green">${userRemains.toFixed(2)} грн</b></div>`;
                });
            } else {
                // СЦЕНАРІЙ 2: ПЕРЕВИЩИЛИ ЛІМІТ (ДОПЛАТА ПОРІВНУ)
                let debt = tout - tin;
                let perPerson = debt / pool.length;
                header.innerHTML = `<div class="res-msg" style="background:#ffebee">⚠️ Не вистачило: ${debt.toFixed(2)} грн</div>`;
                pool.forEach(x => {
                    html += `<div class="card"><b>${x.n}</b><br>Має доплатити порівну: <b style="color:red">${perPerson.toFixed(2)} грн</b></div>`;
                });
            }
            details.innerHTML = html;
        }

        function send() { tg.sendData(JSON.stringify({p: pool, e: exp})); }
        renderP(); renderE();
    </script>
</body>
</html>
